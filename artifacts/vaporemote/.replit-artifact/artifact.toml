kind = "web"
previewPath = "/"
title = "VapoRemote"
version = "1.0.0"
id = "artifacts/vaporemote"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20182

[services.development]
run = "pnpm --filter @workspace/vaporemote run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vaporemote", "run", "build" ]
publicDir = "artifacts/vaporemote/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20182"
BASE_PATH = "/"
